name: Build and deploy ASP.Net Core app to Azure Web App - BusTickets

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build with dotnet
        run: dotnet build Busticket/Busticket.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish Busticket/Busticket.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp" --no-self-contained

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
            
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AEC5DB626120413DB5695ECB97A38CD4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7C9B1F4CF7414F499A7DD63879672F9C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B2E7921EDDFE470ABEA23778262CEF6E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BusTickets'
          slot-name: 'Production'
          package: .s
